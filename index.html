<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time GPS Tracker</title>
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCqm58SgYCVN-CdOxefv0BPG_PTJ75yINM"></script>
    <style>
      /* Map container style */
      #map {
        height: 100vh;  /* Full screen height */
        width: 100%;    /* Full width */
      }
    </style>
  </head>
  <body>
    <!-- Map container -->
    <div id="map"></div>

    <!-- JavaScript to initialize and control the map -->
    <script>
      let map, marker;

      // Function to initialize the map
      function initMap() {
        // Set default location (Manila, Philippines)
        const defaultLocation = { lat: 14.5995, lng: 120.9842 };

        // Initialize the map centered at defaultLocation
        map = new google.maps.Map(document.getElementById("map"), {
          center: defaultLocation,
          zoom: 14,
        });

        // Create a marker at defaultLocation
        marker = new google.maps.Marker({
          position: defaultLocation,
          map: map,
        });

        // Get the user's current location and track their movements
        if (navigator.geolocation) {
          navigator.geolocation.watchPosition(
            (position) => {
              // Update position to user's current location
              const pos = {
                lat: position.coords.latitude,
                lng: position.coords.longitude,
              };

              // Set the map and marker positions to user's current position
              map.setCenter(pos);
              marker.setPosition(pos);
            },
            () => {
              // Handle errors if geolocation fails
              handleLocationError(true, map.getCenter());
            }
          );
        } else {
          // Handle errors if geolocation is not supported
          handleLocationError(false, map.getCenter());
        }
      }

      // Function to handle geolocation errors
      function handleLocationError(browserHasGeolocation, pos) {
        const infoWindow = new google.maps.InfoWindow();
        infoWindow.setPosition(pos);
        infoWindow.setContent(
          browserHasGeolocation
            ? "Error: The Geolocation service failed."
            : "Error: Your browser doesn't support geolocation."
        );
        infoWindow.open(map);
      }

      // Initialize the map when the window loads
      window.onload = initMap;
    </script>
  </body>
</html>
