<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real-time Walking Tracker</title>
    <!-- Include Google Maps API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCqm58SgYCVN-CdOxefv0BPG_PTJ75yINM&libraries=places"></script>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        #map {
            height: 400px;
            width: 100%;
        }
        #status {
            font-size: 18px;
        }
    </style>
</head>
<body>

<h1>Real-time Walking Tracker</h1>
<p id="status">Tracking your location...</p>

<!-- This div will show the map when location tracking is enabled -->
<div id="map"></div>

<script>
// JavaScript for automatic location tracking
let map, marker;

function enableLocationTracking() {
    if (navigator.geolocation) {
        // Start watching the user's location
        navigator.geolocation.watchPosition(updatePosition, showError, {
            enableHighAccuracy: true,  // Use GPS if available
            maximumAge: 0,             // Do not use cached position
            timeout: 10000             // Set a timeout to wait for location
        });
    } else {
        document.getElementById('status').innerText = 'Geolocation is not supported by this browser.';
    }
}

function updatePosition(position) {
    const lat = position.coords.latitude;
    const lng = position.coords.longitude;
    const location = { lat: lat, lng: lng };

    // Display the map
    document.getElementById('map').style.display = 'block';

    // Initialize the map if it doesn't exist
    if (!map) {
        map = new google.maps.Map(document.getElementById('map'), {
            zoom: 18,
            center: location
        });
    } else {
        map.setCenter(location); // Recenter the map to the current position
    }

    // Add or update the marker at the user's location
    if (marker) {
        marker.setPosition(location); // Update marker position
    } else {
        marker = new google.maps.Marker({
            position: location,
            map: map,
            icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 8, // Marker size
                fillColor: '#4285F4', // Blue color
                fillOpacity: 1,
                strokeWeight: 2,
                strokeColor: 'white'
            }
        });
    }
}

function showError(error) {
    switch (error.code) {
        case error.PERMISSION_DENIED:
            document.getElementById('status').innerText = 'User denied the request for Geolocation.';
            break;
        case error.POSITION_UNAVAILABLE:
            document.getElementById('status').innerText = 'Location information is unavailable.';
            break;
        case error.TIMEOUT:
            document.getElementById('status').innerText = 'The request to get user location timed out.';
            break;
        case error.UNKNOWN_ERROR:
            document.getElementById('status').innerText = 'An unknown error occurred.';
            break;
    }
}

// Start location tracking as soon as the page loads
window.onload = enableLocationTracking;
</script>

</body>
</html>
